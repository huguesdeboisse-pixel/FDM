<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Feuille de Messe</title>

<style>
body{
margin:0;
font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
background:#f4f1ea;
color:#1f1f1f;
}

header{
text-align:center;
padding:20px 0 10px 0;
}

header h1{
font-size:1.35rem;
margin:0;
}

header p{
font-size:0.88rem;
color:#666;
margin-top:6px;
}

.container{
max-width:1400px;
margin:auto;
padding:20px;
}

.screen{
display:none;
}

.screen.active{
display:block;
}

.panel{
background:white;
border:1px solid #e3ded4;
border-radius:16px;
padding:20px;
}

.field{
margin-bottom:20px;
}

label{
font-weight:600;
display:block;
margin-bottom:6px;
}

.field-hint{
font-weight:400;
font-size:0.92rem;
color:#666;
margin-top:4px;
}

.date-card{
display:block;
width:100%;
background:white;
border:1px solid #d7d1c6;
border-radius:16px;
padding:16px;
cursor:pointer;
transition:border-color 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease;
box-sizing:border-box;
}

.date-card:hover{
border-color:#b9b0a2;
box-shadow:0 4px 14px rgba(0,0,0,0.06);
}

.date-card:focus-within{
border-color:#8f1d1d;
box-shadow:0 0 0 3px rgba(143,29,29,0.12);
}

.date-card-label{
font-size:1rem;
font-weight:600;
margin-bottom:10px;
}

.date-input-wrap{
display:flex;
align-items:center;
gap:12px;
}

.date-icon{
font-size:1.35rem;
line-height:1;
}

input[type="date"], input[type="text"]{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #ccc;
box-sizing:border-box;
}

.date-card input[type="date"]{
font-size:1.08rem;
padding:14px 16px;
min-height:54px;
border:1px solid #cfc7ba;
border-radius:12px;
background:#fff;
cursor:pointer;
}

.date-card input[type="date"]::-webkit-calendar-picker-indicator{
cursor:pointer;
transform:scale(1.2);
}

.rites{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.rite{
padding:12px 16px;
border:1px solid #ccc;
border-radius:10px;
background:white;
cursor:pointer;
}

.workspace{
display:grid;
grid-template-columns:260px minmax(320px, 1fr) minmax(320px, 1fr);
gap:20px;
align-items:start;
}

.left{
background:white;
border:1px solid #e3ded4;
border-radius:16px;
padding:15px;
}

.middle{
background:white;
border:1px solid #e3ded4;
border-radius:16px;
padding:15px;
display:flex;
flex-direction:column;
}

.section-title{
font-size:1.3rem;
margin-bottom:4px;
}

.section-subtitle{
font-size:0.95rem;
margin-bottom:10px;
color:#555;
}

.search{
margin-bottom:12px;
}

.middle-toolbar{
display:flex;
gap:10px;
margin-bottom:12px;
}

.middle-toolbar button{
padding:10px 12px;
border-radius:10px;
border:1px solid #ccc;
background:white;
cursor:pointer;
}

.chants{
display:flex;
flex-direction:column;
gap:10px;
min-height:240px;
}

.chant{
border:1px solid #ddd;
border-radius:12px;
padding:12px 14px;
display:flex;
align-items:center;
justify-content:space-between;
gap:12px;
cursor:pointer;
background:#fff;
transition:background 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
user-select:none;
}

.chant:hover{
border-color:#bfb7aa;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.chant.selected{
background:#ece8df;
border-color:#cbbfb0;
}

.chant-main{
display:flex;
align-items:center;
gap:10px;
min-width:0;
flex:1;
}

.chant-like{
width:32px;
height:32px;
border-radius:10px;
border:1px solid #ccc;
background:white;
cursor:pointer;
flex:0 0 auto;
}

.chant-title{
font-weight:600;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
min-width:0;
}

.chant-empty{
padding:14px;
border:1px dashed #d2cbc0;
border-radius:12px;
color:#666;
background:#fbfaf7;
}

.nav-buttons{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:12px;
}

.nav-buttons button{
padding:10px;
border-radius:10px;
border:1px solid #ccc;
background:white;
cursor:pointer;
}

.favorites{
margin-top:10px;
padding:10px;
border-radius:10px;
border:1px solid #ccc;
background:white;
cursor:pointer;
}

.sheet-zone{
display:flex;
justify-content:center;
}

.sheet{
width:210mm;
min-height:297mm;
background:white;
padding:20mm 18mm;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
box-sizing:border-box;
}

.sheet-title{
text-align:center;
font-size:1.4rem;
margin:0;
}

.sheet-subtitle{
text-align:center;
font-size:0.95rem;
color:#555;
margin-bottom:20px;
}

.sheet-section{
margin-bottom:18px;
padding:8px 0;
border-top:1px solid #ece6dc;
}

.sheet-section:first-child{
border-top:none;
padding-top:0;
}

.sheet-section-header{
display:flex;
align-items:center;
justify-content:space-between;
gap:12px;
margin-bottom:8px;
}

.sheet-section-header h3{
font-size:1rem;
margin:0;
}

.sheet-dropzone{
min-height:12px;
border-radius:10px;
transition:background 0.15s ease, outline-color 0.15s ease;
}

.sheet-dropzone.active{
background:#f7f1eb;
outline:2px dashed #cbbfb0;
outline-offset:4px;
}

.sheet-chant-item{
border:1px solid #ddd6ca;
border-radius:12px;
padding:10px 12px;
margin-bottom:10px;
background:#fff;
cursor:grab;
}

.sheet-chant-item:active{
cursor:grabbing;
}

.sheet-chant-top{
display:flex;
align-items:center;
justify-content:space-between;
gap:10px;
margin-bottom:8px;
}

.sheet-chant-title{
font-weight:700;
}

.sheet-chant-actions{
display:flex;
align-items:center;
gap:8px;
flex-wrap:wrap;
}

.sheet-chant-actions button{
padding:6px 9px;
border-radius:8px;
border:1px solid #ccc;
background:white;
cursor:pointer;
}

.sheet-chant-body{
display:flex;
flex-direction:column;
gap:10px;
}

.sheet-refrain,
.sheet-couplet{
padding:8px 10px;
border-radius:10px;
background:#faf8f4;
}

.sheet-refrain-label,
.sheet-couplet-label{
font-size:0.82rem;
font-weight:700;
margin-bottom:4px;
color:#555;
}

.sheet-couplet-head{
display:flex;
align-items:center;
justify-content:space-between;
gap:8px;
margin-bottom:4px;
}

.couplet-remove{
border:none;
background:none;
font-size:1rem;
line-height:1;
cursor:pointer;
padding:0 4px;
color:#6b2b2b;
}

.sheet-empty{
color:#666;
padding:14px 0;
}

.download{
margin-top:15px;
padding:10px;
border-radius:10px;
border:none;
background:#8f1d1d;
color:white;
cursor:pointer;
}

.summary-title{
font-weight:700;
margin-bottom:8px;
}

.summary-line{
font-size:0.95rem;
margin-bottom:6px;
color:#444;
}

.section-pill{
display:flex;
align-items:center;
justify-content:space-between;
gap:10px;
width:100%;
padding:8px 10px;
border-radius:10px;
background:#f6f3ee;
margin-bottom:8px;
font-size:0.92rem;
border:1px solid transparent;
cursor:pointer;
text-align:left;
}

.section-pill.active{
background:#efe5e5;
border:1px solid #d8bcbc;
}

.section-pill-count{
font-weight:700;
color:#6b2b2b;
}

.section-summary-empty{
font-size:0.92rem;
color:#666;
padding:10px 0;
}

.back-link{
margin-bottom:14px;
padding:0;
background:none;
border:none;
cursor:pointer;
font:inherit;
color:#6b2b2b;
text-align:left;
}

@media (max-width: 1100px){
.workspace{
grid-template-columns:1fr;
}
.sheet{
width:100%;
min-height:auto;
}
}
</style>
</head>

<body>

<header>
<h1>Feuille de Messe</h1>
<p>Qui bien chante, deux fois prie - St Augustin.</p>
</header>

<div class="container">

<section id="screen1" class="screen active panel">

<div class="field">
<label for="dateInput">
Date de la messe
</label>

<div id="dateCard" class="date-card" role="button" tabindex="0" aria-label="Ouvrir le calendrier">
<div class="date-card-label">Choisir une date</div>
<div class="date-input-wrap">
<div class="date-icon">📅</div>
<input id="dateInput" type="date">
</div>
</div>

<div class="field-hint">
(sert à déterminer le temps liturgique et la célébration du jour)
</div>
</div>

<div class="field">
<label>Choix du rite</label>

<div class="rites">
<button class="rite" data-rite="ordinaire">Rite ordinaire</button>
<button class="rite" data-rite="extraordinaire">Rite extraordinaire</button>
</div>
</div>

<div class="field">
<label>Carnets de chants</label>
<input id="searchCarnet" type="text" placeholder="Rechercher un carnet">
</div>

</section>

<section id="screen2" class="screen">

<div class="workspace">

<div class="left">
<button id="backToSetup" class="back-link">← Revenir au paramétrage</button>
<div id="summary"></div>
<div id="sections"></div>
</div>

<div class="middle">
<div class="section-title" id="sectionTitle"></div>
<div class="section-subtitle" id="sectionSubtitle"></div>

<input id="chantSearch" class="search" type="text" placeholder="Rechercher un chant">

<div class="middle-toolbar">
<button id="refreshSuggestions" type="button">Rafraîchir</button>
</div>

<div id="chants" class="chants"></div>

<div class="nav-buttons">
<button id="prev">← Précédent</button>
<button id="next">Suivant →</button>
</div>

<button id="favoritesButton" class="favorites">Favoris</button>
</div>

<div class="sheet-zone">
<div class="sheet">
<h2 id="sheetTitle" class="sheet-title"></h2>
<div id="sheetSubtitle" class="sheet-subtitle"></div>
<div id="sheetContent"></div>
<button id="download" class="download">Télécharger la feuille</button>
</div>
</div>

</div>
</section>

</div>

<script type="module" src="./calendrier/calendrier_liturgique.js"></script>
<script src="./app.js"></script>

</body>
</html>
