<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Feuille de Messe</title>

<style>

body{
margin:0;
font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
background:#f4f1ea;
color:#1f1f1f;
}

header{
text-align:center;
padding:20px 0 10px 0;
}

header h1{
font-size:1.5rem;
margin:0;
}

header p{
font-size:0.9rem;
color:#666;
margin-top:6px;
}

.container{
max-width:1400px;
margin:auto;
padding:20px;
}

.screen{
display:none;
}

.screen.active{
display:block;
}

.panel{
background:white;
border:1px solid #e3ded4;
border-radius:16px;
padding:20px;
}

.field{
margin-bottom:20px;
}

label{
font-weight:600;
display:block;
margin-bottom:6px;
}

input[type="date"], input[type="text"]{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #ccc;
}

.rites{
display:flex;
gap:10px;
}

.rite{
padding:10px 16px;
border:1px solid #ccc;
border-radius:10px;
background:white;
cursor:pointer;
}

.workspace{
display:grid;
grid-template-columns:260px 1fr auto;
gap:20px;
}

.left{
background:white;
border:1px solid #e3ded4;
border-radius:16px;
padding:15px;
}

.middle{
background:white;
border:1px solid #e3ded4;
border-radius:16px;
padding:15px;
display:flex;
flex-direction:column;
}

.section-title{
font-size:1.3rem;
margin-bottom:4px;
}

.section-subtitle{
font-size:0.95rem;
margin-bottom:10px;
}

.search{
margin-bottom:15px;
}

.chants{
flex:1;
}

.chant{
border:1px solid #ddd;
border-radius:12px;
padding:10px;
margin-bottom:10px;
}

.nav-buttons{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px;
}

.nav-buttons button{
padding:10px;
border-radius:10px;
border:1px solid #ccc;
background:white;
cursor:pointer;
}

.favorites{
margin-top:10px;
padding:10px;
border-radius:10px;
border:1px solid #ccc;
background:white;
cursor:pointer;
}

.sheet-zone{
display:flex;
justify-content:center;
}

.sheet{
width:210mm;
min-height:297mm;
background:white;
padding:20mm 18mm;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.sheet-title{
text-align:center;
font-size:1.4rem;
margin:0;
}

.sheet-subtitle{
text-align:center;
font-size:0.95rem;
color:#555;
margin-bottom:20px;
}

.sheet-section{
margin-bottom:15px;
}

.sheet-section h3{
font-size:1rem;
margin-bottom:6px;
}

.download{
margin-top:15px;
padding:10px;
border-radius:10px;
border:none;
background:#8f1d1d;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<header>
<h1>Feuille de Messe</h1>
<p>Préparez votre feuille de messe à partir de la date, du rite et des chants.</p>
</header>

<div class="container">

<!-- Écran 1 -->

<section id="screen1" class="screen active panel">

<div class="field">
<label>
Date de la messe<br>
<span style="font-weight:400;font-size:0.9rem">
(sert à déterminer le temps liturgique et la célébration du jour)
</span>
</label>
<input id="dateInput" type="date">
</div>

<div class="field">
<label>Choix du rite</label>

<div class="rites">
<button class="rite" data-rite="ordinaire">Rite ordinaire</button>
<button class="rite" data-rite="extraordinaire">Rite extraordinaire</button>
</div>

</div>

<div class="field">
<label>Carnets de chants</label>
<input id="searchCarnet" type="text" placeholder="Rechercher un carnet">
</div>

</section>


<!-- Écran 2 -->

<section id="screen2" class="screen">

<div class="workspace">

<div class="left">

<div id="summary"></div>

<div id="sections"></div>

</div>


<div class="middle">

<div class="section-title" id="sectionTitle"></div>
<div class="section-subtitle" id="sectionSubtitle"></div>

<input id="chantSearch" class="search" type="text" placeholder="Rechercher un chant">

<div id="chants" class="chants"></div>

<div class="nav-buttons">
<button id="prev">← Précédent</button>
<button id="next">Suivant →</button>
</div>

<button id="favoritesButton" class="favorites">Favoris</button>

</div>


<div class="sheet-zone">

<div class="sheet">

<h2 id="sheetTitle" class="sheet-title"></h2>
<div id="sheetSubtitle" class="sheet-subtitle"></div>

<div id="sheetContent"></div>

<button id="download" class="download">Télécharger la feuille</button>

</div>

</div>

</div>

</section>

</div>

<script type="module" src="./calendrier/calendrier_liturgique.js"></script>
<script src="./app.js"></script>

</body>
</html>
